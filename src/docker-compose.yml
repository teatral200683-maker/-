version: '3.8'

services:
  crypto-bot:
    build:
      context: .
      target: production
    container_name: crypto-trader-bot
    restart: unless-stopped

    # Секреты через .env файл (НЕ попадает в образ)
    env_file:
      - .env

    # Persistent данные
    volumes:
      - ./data:/app/data        # SQLite база сделок
      - ./logs:/app/logs        # Логи бота
      - ./config.json:/app/config.json:ro  # Конфиг (read-only)

    # Ресурсы
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M

    # Health check
    healthcheck:
      test: ["CMD", "python", "-c", "import sqlite3; sqlite3.connect('/app/data/trades.db').close()"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

    # Логирование
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
